<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crop Recommendation System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>Crop Recommendation</h1>
            <p class="subtitle">Enter soil and environment data to find the best crop.</p>
            
            <form id="prediction-form">
                <div class="input-group">
                    <label for="N">Nitrogen (N)</label>
                    <input type="number" id="N" name="N" step="any" required placeholder="e.g. 90">
                </div>
                
                <div class="input-group">
                    <label for="P">Phosphorus (P)</label>
                    <input type="number" id="P" name="P" step="any" required placeholder="e.g. 42">
                </div>
                
                <div class="input-group">
                    <label for="K">Potassium (K)</label>
                    <input type="number" id="K" name="K" step="any" required placeholder="e.g. 43">
                </div>
                
                <div class="input-group">
                    <label for="temperature">Temperature (°C)</label>
                    <input type="number" id="temperature" name="temperature" step="any" required placeholder="e.g. 20.8">
                </div>
                
                <div class="input-group">
                    <label for="humidity">Humidity (%)</label>
                    <input type="number" id="humidity" name="humidity" step="any" required placeholder="e.g. 82.0">
                </div>
                
                <div class="input-group">
                    <label for="ph">pH Level</label>
                    <input type="number" id="ph" name="ph" step="any" required placeholder="e.g. 6.5">
                </div>
                
                <div class="input-group">
                    <label for="rainfall">Rainfall (mm)</label>
                    <input type="number" id="rainfall" name="rainfall" step="any" required placeholder="e.g. 202.9">
                </div>

                <button type="submit" id="submit-btn">Predict Crop</button>
            </form>

            <div id="result-container" class="hidden">
                <h2>Recommended Crop:</h2>
                <div id="predicted-crop">Rice</div>
                <div id="model-accuracy">Model Accuracy: 99%</div>
            </div>
            
            <div id="error-container" class="hidden">
                <p id="error-message"></p>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
